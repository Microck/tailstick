<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>tailstick</title>
<link rel="icon" type="image/png" href="/favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#1F1E1E;
  --bg-input:#2E2D2D;
  --border:rgba(255,255,255,.07);
  --border-focus:rgba(79,124,255,.45);
  --t1:#edf0f5;
  --t2:#a8b0be;
  --t3:#727a88;
  --t4:#505662;
  --btn:#444342;
  --btn-h:#555452;
  --green:#34d399;
  --red:#f87171;
  --r:5px;
}
html{font-size:14px;background:var(--bg);color:var(--t1)}
body{font-family:'Geist',system-ui,-apple-system,sans-serif;letter-spacing:-.012em;line-height:1.5;-webkit-font-smoothing:antialiased;padding:0;margin:0}

.page{max-width:680px;margin:0 auto;padding:32px 24px 48px}

/* Divider */
hr{border:none;border-top:1px solid var(--border);margin:0}

/* Section label */
.sec{font-size:11px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.07em;padding:20px 0 10px}

/* Form grid */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px 16px}
@media(max-width:520px){.g2{grid-template-columns:1fr}}
.f{display:flex;flex-direction:column;gap:3px}
.f.w{grid-column:1/-1}
.f label{font-size:11px;font-weight:500;color:var(--t3)}
.f select,.f input[type=text],.f input[type=number],.f input[type=password]{
  background:var(--bg-input);border:1px solid var(--border);border-radius:var(--r);
  padding:7px 9px;color:var(--t1);font-family:inherit;font-size:13px;outline:none;transition:border .15s}
.f select:focus,.f input:focus{border-color:var(--border-focus)}
.f select option{background:#2E2D2D;color:var(--t1)}
.f input::placeholder{color:var(--t4)}
.f .sub{font-size:10px;color:var(--t4);padding-top:1px}

/* Check */
.ck{flex-direction:row;align-items:center;gap:7px;padding-top:6px}
.ck input[type=checkbox]{
  appearance:none;width:15px;height:15px;border:1px solid var(--border);border-radius:3px;
  background:var(--bg-input);cursor:pointer;position:relative;flex-shrink:0}
.ck input[type=checkbox]:checked{background:var(--accent);border-color:var(--accent)}
.ck input[type=checkbox]:checked::after{
  content:'';position:absolute;left:4px;top:1px;width:4.5px;height:8.5px;
  border:solid #fff;border-width:0 1.5px 1.5px 0;transform:rotate(45deg)}
.ck label{font-size:12px;color:var(--t2);cursor:pointer}
.tip{font-size:13px;color:var(--t4);cursor:help;position:relative;display:inline-flex;align-items:center}
.tip:hover::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);
  background:#2E2D2D;border:1px solid var(--border);border-radius:4px;padding:6px 10px;
  font-size:11px;color:var(--t2);white-space:normal;width:260px;z-index:10;line-height:1.5;letter-spacing:0}

/* Submit */
.sub-row{display:flex;justify-content:flex-end;padding-top:14px}
.btn{
  background:var(--btn);color:#fff;border:none;border-radius:var(--r);
  padding:7px 20px;font-family:inherit;font-size:12px;font-weight:600;
  cursor:pointer;transition:background .15s,opacity .15s}
.btn:hover{background:var(--btn-h)}
.btn:disabled{opacity:.4;cursor:not-allowed}

.hdr{display:flex;align-items:center;padding-bottom:16px}
.hdr .logo{height:22px;width:auto;flex-shrink:0}
.hdr-right{margin-left:auto;display:flex;align-items:center}
.hdr-right a{color:var(--t3);transition:color .15s;display:flex;align-items:center}
.hdr-right a:hover{color:var(--t1)}
.hdr-right svg{width:20px;height:20px;fill:currentColor}

/* Result */
.res{padding:14px 0}
.res.s{border-left:2px solid var(--green);padding-left:14px}
.res.e{border-left:2px solid var(--red);padding-left:14px}
.res h3{font-size:13px;font-weight:600;margin-bottom:6px}
.res.s h3{color:var(--green)}
.res.e h3{color:var(--red)}
.res .d{font-size:12px;color:var(--t2);line-height:1.6}
.res .d code{background:var(--bg-input);padding:1px 5px;border-radius:3px;font-size:11px;color:var(--t1)}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.06);border-radius:3px}

.spin{display:inline-block;width:12px;height:12px;border:1.5px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:sp .55s linear infinite;vertical-align:middle;margin-right:5px}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="page">

  <div class="hdr">
    <img class="logo" src="https://raw.githubusercontent.com/Microck/tailstick/main/.github/assets/tailstick-logo-darkmode.svg" alt="tailstick">
    <div class="hdr-right">
      <a href="https://github.com/Microck/tailstick" target="_blank" rel="noopener" title="GitHub">
        <svg viewBox="0 0 16 16"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
      </a>
    </div>
  </div>

  <hr>

  <form id="f" autocomplete="off">
    <div class="sec">Create Lease</div>
    <div class="g2">

      <div class="f">
        <label for="mode">Mode</label>
        <select id="mode" name="mode">
          <option value="session">Session-only</option>
          <option value="timed" selected>Timed lease</option>
          <option value="permanent">Permanent</option>
        </select>
      </div>

      <div class="f">
        <label for="channel">Version</label>
        <select id="channel" name="channel">
          <option value="stable" selected>Stable</option>
          <option value="latest">Latest</option>
        </select>
      </div>

      <div class="f" id="daysF">
        <label for="days">Duration</label>
        <select id="days" name="days">
          <option value="1">1 day</option>
          <option value="3" selected>3 days</option>
          <option value="7">7 days</option>
          <option value="custom">Custom...</option>
        </select>
      </div>

      <div class="f" id="cdf" style="display:none">
        <label for="cd">Custom days</label>
        <input type="number" id="cd" name="cd" min="1" max="30" value="5" placeholder="1-30">
        <span class="sub">1 - 30 days</span>
      </div>

      <div class="f w" id="presetWrap" style="display:none">
        <label for="preset">Preset</label>
        <select id="preset" name="preset"></select>
        <div class="sub" id="presetDesc"></div>
      </div>

    </div>

    <div class="sec">Options</div>
    <div class="g2">

      <div class="f">
        <label for="suffix">Device suffix</label>
        <input type="text" id="suffix" name="suffix" placeholder="optional" maxlength="16">
      </div>

      <div class="f">
        <label for="password">Operator password</label>
        <input type="password" id="password" name="password" placeholder="if required">
      </div>

      <div class="f ck">
        <input type="checkbox" id="ax" name="allowExisting">
        <label for="ax">Allow existing Tailscale install</label>
        <span class="tip" data-tip="Enable this if the target machine already has Tailscale installed. TailStick will adopt or replace the existing installation instead of refusing.">&#9432;</span>
      </div>

    </div>

    <div class="sub-row">
      <button type="submit" class="btn" id="go">Create Lease</button>
    </div>
  </form>

  <div id="res"></div>

</div>

<script>
(function(){
  var presets=[];
  var $=function(id){return document.getElementById(id)};

  function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}

  function loadPresets(){
    fetch('/api/presets').then(function(r){return r.json()}).then(function(data){
      presets=data.presets||[];
      var sel=$('preset');sel.innerHTML='';
      presets.forEach(function(p){
        var o=document.createElement('option');o.value=p.id;o.textContent=p.id;sel.appendChild(o);
      });
      if(data.defaultPreset)sel.value=data.defaultPreset;
      $('presetWrap').style.display=presets.length>1?'':'none';
      upDesc();
    }).catch(function(){});
  }

  function selP(){
    var id=$('preset').value;
    for(var i=0;i<presets.length;i++)if(presets[i].id===id)return presets[i];
    return null;
  }
  function upDesc(){var p=selP();$('presetDesc').textContent=p&&p.description?p.description:''}

  function upMode(){
    var m=$('mode').value;
    $('daysF').style.display=m==='timed'?'':'none';
    if(m!=='timed')$('cdf').style.display='none';
  }
  function upCust(){var s=$('days').value==='custom'&&$('mode').value==='timed';$('cdf').style.display=s?'':'none'}

  $('preset').addEventListener('change',function(){upDesc()});
  $('mode').addEventListener('change',function(){upMode()});
  $('days').addEventListener('change',function(){upCust()});

  $('f').addEventListener('submit',function(e){
    e.preventDefault();
    var btn=$('go');btn.disabled=true;btn.innerHTML='<span class="spin"></span>Enrolling...';
    var mode=$('mode').value,dv=$('days').value;
    var days=mode==='timed'?(dv==='custom'?0:parseInt(dv,10)):0;
    var cd=dv==='custom'?parseInt($('cd').value,10):0;
    var body={presetId:$('preset').value,mode:mode,channel:$('channel').value,
      days:days,customDays:cd,suffix:$('suffix').value,exitNode:'',
      allowExisting:$('ax').checked,password:$('password').value};
    fetch('/api/enroll',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)})
    .then(function(r){return r.json()}).then(function(data){
      btn.disabled=false;btn.textContent='Create Lease';
      if(data.ok)showRes('s',data);else showRes('e',data);
    }).catch(function(e){
      btn.disabled=false;btn.textContent='Create Lease';
      showRes('e',{error:e.message});
    });
  });

  function showRes(t,data){
    var el=$('res');
    if(t==='s'){
      var exp=data.expiresAt?new Date(data.expiresAt).toLocaleString():'No expiry';
      el.innerHTML='<div class="res s"><h3>Lease Created</h3><div class="d">'+
        'Lease ID: <code>'+esc(data.leaseId)+'</code><br>'+
        'Device: <code>'+esc(data.deviceName)+'</code><br>'+
        'Mode: '+esc(data.mode)+'<br>'+
        'Expires: '+esc(exp)+'</div></div>';
    }else{
      el.innerHTML='<div class="res e"><h3>Enrollment Failed</h3><div class="d">'+esc(data.error||'Unknown error')+'</div></div>';
    }
  }

  loadPresets();upMode();upCust();
})();
</script>
</body>
</html>
