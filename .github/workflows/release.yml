name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: linux
            goarch: arm64
            ext: ""
          - goos: windows
            goarch: amd64
            ext: ".exe"
          - goos: windows
            goarch: arm64
            ext: ".exe"
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.6"

      - name: Build artifacts
        run: |
          mkdir -p dist
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -o dist/tailstick-cli-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} ./cmd/tailstick-${{ matrix.goos }}-cli
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -o dist/tailstick-gui-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }} ./cmd/tailstick-${{ matrix.goos }}-gui

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/tailstick-cli-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}
            dist/tailstick-gui-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}
