name: live-e2e

on:
  workflow_dispatch:
    inputs:
      run-linux:
        description: Run the Linux live E2E lane
        required: false
        default: true
        type: boolean
      run-windows:
        description: Run the Windows live E2E lane
        required: false
        default: true
        type: boolean

concurrency:
  group: live-e2e
  cancel-in-progress: false

jobs:
  linux-live-e2e:
    if: ${{ github.event.inputs.run-linux != 'false' }}
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.6"

      - name: Build Linux CLI binary
        run: |
          mkdir -p dist
          go build -o dist/tailstick-linux-cli ./cmd/tailstick-linux-cli

      - name: Build isolated Linux test image
        run: docker build -f tests/live/linux-live-e2e.dockerfile -t tailstick-live-e2e .

      - name: Start isolated Linux systemd container
        run: |
          docker run --detach \
            --name tailstick-live-e2e \
            --privileged \
            --cgroupns=host \
            --tmpfs /run \
            --tmpfs /run/lock \
            --volume /sys/fs/cgroup:/sys/fs/cgroup:rw \
            --volume "${{ github.workspace }}:/src" \
            --workdir /src \
            tailstick-live-e2e

      - name: Wait for Linux container init
        run: |
          for _ in $(seq 1 30); do
            if docker exec tailstick-live-e2e bash -lc 'test -d /run/systemd/system'; then
              exit 0
            fi
            sleep 1
          done
          docker exec tailstick-live-e2e bash -lc 'ls -la /run || true'
          exit 1

      - name: Create Linux live auth key
        id: linux-key
        env:
          TAILSTICK_API_KEY: ${{ secrets.TAILSTICK_LIVE_E2E_API_KEY }}
        run: |
          response="$(
            curl -fsS -u "${TAILSTICK_API_KEY}:" \
              -H 'Content-Type: application/json' \
              -d '{"capabilities":{"devices":{"create":{"reusable":false,"ephemeral":false,"preauthorized":true}}},"expirySeconds":3600,"description":"linux live e2e"}' \
              https://api.tailscale.com/api/v2/tailnet/-/keys
          )"
          auth_key="$(printf '%s' "$response" | jq -r '.key')"
          test -n "$auth_key"
          test "$auth_key" != "null"
          echo "::add-mask::$auth_key"
          echo "auth_key=$auth_key" >> "$GITHUB_OUTPUT"

      - name: Run Linux live E2E
        env:
          TAILSTICK_AUTH_KEY: ${{ steps.linux-key.outputs.auth_key }}
          TAILSTICK_API_KEY: ${{ secrets.TAILSTICK_LIVE_E2E_API_KEY }}
          TAILSTICK_OPERATOR_PASSWORD: ${{ secrets.TAILSTICK_LIVE_E2E_OPERATOR_PASSWORD }}
          TAILSTICK_BIN: /src/dist/tailstick-linux-cli
        run: |
          docker exec \
            -e TAILSTICK_AUTH_KEY \
            -e TAILSTICK_API_KEY \
            -e TAILSTICK_OPERATOR_PASSWORD \
            -e TAILSTICK_BIN \
            tailstick-live-e2e \
            bash /src/tests/live/linux-live-e2e.sh

      - name: Dump Linux live E2E logs on failure
        if: failure()
        run: |
          docker exec tailstick-live-e2e bash -lc 'journalctl --no-pager || true'
          docker exec tailstick-live-e2e bash -lc 'cat /var/tmp/tailstick-live-e2e/tailscaled.log || true'
          docker exec tailstick-live-e2e bash -lc 'cat /var/tmp/tailstick-live-e2e/tailstick.log || true'
          docker exec tailstick-live-e2e bash -lc 'cat /var/tmp/tailstick-live-e2e/state.json || true'

      - name: Stop isolated Linux container
        if: always()
        run: docker rm -f tailstick-live-e2e || true

  windows-live-e2e:
    if: ${{ github.event.inputs.run-windows != 'false' }}
    runs-on: windows-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.6"

      - name: Build Windows CLI binary
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          go build -o dist/tailstick-windows-cli.exe ./cmd/tailstick-windows-cli

      - name: Install Tailscale
        shell: pwsh
        run: |
          winget install -e --id Tailscale.Tailscale --accept-package-agreements --accept-source-agreements
          $tailscalePath = "C:\Program Files\Tailscale"
          if (-not (Test-Path (Join-Path $tailscalePath "tailscale.exe"))) {
            throw "tailscale.exe not found after install"
          }
          Add-Content -Path $env:GITHUB_PATH -Value $tailscalePath

      - name: Create Windows live auth key
        id: windows-key
        shell: pwsh
        env:
          TAILSTICK_API_KEY: ${{ secrets.TAILSTICK_LIVE_E2E_API_KEY }}
        run: |
          $tokenBytes = [System.Text.Encoding]::ASCII.GetBytes("${env:TAILSTICK_API_KEY}:")
          $headers = @{
            Authorization = "Basic $([Convert]::ToBase64String($tokenBytes))"
            "Content-Type" = "application/json"
          }
          $body = @{
            capabilities = @{
              devices = @{
                create = @{
                  reusable = $false
                  ephemeral = $true
                  preauthorized = $true
                }
              }
            }
            expirySeconds = 3600
            description = "windows live e2e"
          } | ConvertTo-Json -Depth 5 -Compress
          $response = Invoke-RestMethod -Method Post -Uri "https://api.tailscale.com/api/v2/tailnet/-/keys" -Headers $headers -Body $body
          if ([string]::IsNullOrWhiteSpace($response.key)) {
            throw "failed to create ephemeral auth key for windows live E2E"
          }
          Write-Host "::add-mask::$($response.key)"
          "ephemeral_auth_key=$($response.key)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Run Windows live E2E
        shell: pwsh
        env:
          TAILSTICK_EPHEMERAL_AUTH_KEY: ${{ steps.windows-key.outputs.ephemeral_auth_key }}
          TAILSTICK_API_KEY: ${{ secrets.TAILSTICK_LIVE_E2E_API_KEY }}
          TAILSTICK_OPERATOR_PASSWORD: ${{ secrets.TAILSTICK_LIVE_E2E_OPERATOR_PASSWORD }}
        run: ./tests/live/windows-live-e2e.ps1

      - name: Dump Windows live E2E logs on failure
        if: failure()
        shell: pwsh
        run: |
          $workDir = Join-Path $env:TEMP "tailstick-live-e2e"
          Get-Content -Path (Join-Path $workDir "tailstick.log") -ErrorAction SilentlyContinue
          Get-Content -Path (Join-Path $workDir "state.json") -ErrorAction SilentlyContinue
